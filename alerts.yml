groups:
  - name: kyro_alerts
    rules:
      # Error rate > 10%
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[1m]) / rate(http_requests_total[1m]) > 0.1
        for: 5s
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate has exceeded 10% for the last 1 minute."

      # Latency > 500ms
      - alert: HighLatency
        expr: rate(http_request_duration_seconds_sum[1m]) / rate(http_request_duration_seconds_count[1m]) > 0.5
        for: 5s
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "Average request latency has exceeded 500ms."

      # Database Error (custom simulated gauge)
      - alert: DatabaseFailure
        expr: db_health_status == 0
        for: 5s
        labels:
          severity: critical
        annotations:
          summary: "Database connection failed"
          description: "Checkout service lost connection to the database."

      # Payment Failure (custom simulated gauge)
      - alert: PaymentGatewayFailure
        expr: payment_gateway_status == 0
        for: 5s
        labels:
          severity: critical
        annotations:
          summary: "Payment Gateway Failure"
          description: "Payment processing is failing."

      # CPU > 90%
      - alert: HighCPUUsage
        expr: simulated_cpu_usage_percent > 90
        for: 5s
        labels:
          severity: critical
        annotations:
          summary: "High CPU Usage"
          description: "CPU usage is above 90%."

      # Memory > 85%
      - alert: HighMemoryUsage
        expr: simulated_memory_usage_percent > 85
        for: 5s
        labels:
          severity: warning
        annotations:
          summary: "High Memory Usage (Leak suspected)"
          description: "Memory usage is above 85%."

      # Disk Full
      - alert: DiskFull
        expr: simulated_disk_usage_percent >= 100
        for: 5s
        labels:
          severity: critical
        annotations:
          summary: "Disk is full"
          description: "Disk usage has reached 100%."
